<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logi Workspace · Suite de Gestión y Diseñador de Esquemas</title>
    <link rel="icon" type="image/jpeg" href="/src/logo.jpg">
    
    <!-- Fuentes Stitch -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'var(--primary)',
            },
            fontFamily: {
              headline: ['Space Grotesk', 'sans-serif'],
              body: ['Inter', 'sans-serif']
            }
          }
        }
      }
    </script>
</head>
<body class="bg-[#050505] font-body text-slate-100 selection:bg-primary/30 overflow-hidden h-screen w-screen">

    <div id="app" class="flex h-full w-full overflow-hidden">
        <!-- === SIDEBAR PANORÁMICO (Desktop Left Navigation) === -->
        <aside id="sidebar-nav" class="w-64 h-full bg-[#0a0a0c] border-r border-white/10 flex flex-col justify-between p-5 z-40 shrink-0 select-none">
            <!-- Inyectado por SidebarNav.js -->
        </aside>

        <!-- === ÁREA PRINCIPAL DE TRABAJO (Main Workspace Viewport) === -->
        <main id="workspace-viewport" class="flex-1 h-full relative overflow-hidden bg-[#050505] flex flex-col">
            <!-- Inyectado por Architect.js -->
        </main>
    </div>

    <!-- Loader de Progreso Global con Blur Premium -->
    <div id="global-loader" class="hidden fixed inset-0 z-50 bg-black/75 backdrop-blur-md flex flex-col items-center justify-center space-y-4 select-none">
        <div class="w-14 h-14 rounded-2xl bg-black/40 border border-white/10 flex items-center justify-center shadow-2xl relative">
            <span class="material-symbols-outlined text-primary text-3xl animate-spin">sync</span>
        </div>
        <div class="text-center space-y-1">
            <p id="global-loader-title" class="text-xs font-bold font-headline text-white uppercase tracking-wider">Cargando Datos</p>
            <p id="global-loader-desc" class="text-[10px] text-white/40 max-w-xs font-body leading-normal px-4">Procesando elementos, por favor espera...</p>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
